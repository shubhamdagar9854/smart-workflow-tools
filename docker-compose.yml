version: '3.8'

services:
  # Login Service (Main Gateway)
  login-service:
    build:
      context: ./login/new-project
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URL=mongodb://mongodb:27017/smartworkflow
    volumes:
      - ./login/new-project:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - microservices-network

  # Resume Scanner Service
  resume-service:
    build:
      context: ./resume
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./resume:/app
    depends_on:
      - postgres
      - redis
    networks:
      - microservices-network

  # Cold Email Service
  cold-email-service:
    build:
      context: ./COLD-EMAIL
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URL=mongodb://mongodb:27017/smartworkflow
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - ./COLD-EMAIL:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - microservices-network

  # Gmail to Sheets Service
  gmail-service:
    build:
      context: ./gmail-to-sheets
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - PORT=8000
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    volumes:
      - ./gmail-to-sheets:/app
      - ./credentials:/app/credentials:ro
    depends_on:
      - postgres
      - redis
    networks:
      - microservices-network

  # Practice/Dev Tools Service
  practice-service:
    build:
      context: ./practice
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URL=mongodb://mongodb:27017/smartworkflow
    volumes:
      - ./practice:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - microservices-network

  # Databases
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=smartworkflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  mongodb:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - microservices-network

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./login/new-project/localhost+2.pem:/etc/nginx/ssl/cert.pem
      - ./login/new-project/localhost+2-key.pem:/etc/nginx/ssl/key.pem
    depends_on:
      - login-service
      - resume-service
      - cold-email-service
      - gmail-service
      - practice-service
    networks:
      - microservices-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  microservices-network:
    driver: bridge
